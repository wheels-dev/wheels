name: Deploy static sites

on:
  push:
    branches: [develop]
    paths:
      - 'web/**'
      - '.github/workflows/web-deploy.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'web/**'
      - '.github/workflows/web-deploy.yml'
  repository_dispatch:
    types: [registry-updated]

jobs:
  deploy:
    name: Deploy ${{ matrix.site }}
    runs-on: ubuntu-latest
    concurrency:
      group: web-deploy-${{ matrix.site }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        site: ${{ github.event_name == 'repository_dispatch' && fromJSON('["packages"]') || fromJSON('["landing", "blog", "guides", "api", "packages"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.23.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.site }}
        working-directory: web
        run: pnpm --filter @wheels-dev/site-${{ matrix.site }} build

      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Routed via env to keep untrusted branch names out of the command string.
          DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}
          SITE: ${{ matrix.site }}
        run: |
          # Pass --commit-message explicitly. wrangler auto-derives from git
          # when omitted, and Cloudflare's API rejects non-ASCII content in
          # auto-merged GitHub commit bodies (em-dashes, arrows, etc.) with
          # "Invalid commit message, it must be a valid UTF-8 string". Send
          # a controlled ASCII string instead. See PR #2550 for the snapshot.yml
          # variant of this fix and the originating failure (run 25641189988).
          pnpm dlx wrangler@4.78.0 pages deploy "sites/${SITE}/dist" \
            --project-name="wheels-${SITE}" \
            --branch="${DEPLOY_BRANCH}" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="deploy ${SITE} from ${DEPLOY_BRANCH} (run ${GITHUB_RUN_ID})"

  visual-regression:
    name: Visual regression
    # Hard gate for non-content changes (layout/styling/structure). For
    # content-only pushes (markdown under web/content/blog/posts/), the
    # job auto-regenerates the affected baseline, commits it back to
    # develop with [skip ci], and exits success — so adding a new blog
    # article doesn't trip a stale-baseline failure.
    #
    # If this job fails on a non-content PR and the change is intentional,
    # download the `visual-regression-diffs` artifact and copy each
    # *.actual.png over the matching web/tests/visual-baselines/*.png,
    # commit, and push.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.23.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Build all sites
        working-directory: web
        run: pnpm build

      # The blog index page is content-driven — new articles appear on it
      # automatically — so the blog baseline is *expected* to drift whenever
      # any file under web/content/blog/posts/ changes. Detect that here and
      # pre-refresh the blog baseline before the regression test runs, so
      # mixed commits (blog content alongside CLI / guides / etc.) don't
      # surface the expected blog drift as a "real regression."
      - name: Detect blog content change
        id: scope
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          # `changed` comes from git itself (file paths under version
          # control), not from user-controlled event metadata, so it's
          # safe to grep over without further sanitization.
          changed=$(git diff --name-only HEAD~1..HEAD)
          if echo "$changed" | grep -qE '^web/content/blog/posts/'; then
            echo "blog_content_changed=true" >> "$GITHUB_OUTPUT"
            echo "Blog content changed — will pre-refresh blog baseline before regression."
          else
            echo "blog_content_changed=false" >> "$GITHUB_OUTPUT"
            echo "No blog content changes detected."
          fi

      - name: Pre-refresh blog baseline before regression test
        if: steps.scope.outputs.blog_content_changed == 'true'
        working-directory: web
        run: node scripts/visual-regression.mjs --update --site blog

      - name: Run visual regression
        id: regress
        continue-on-error: true
        working-directory: web
        run: pnpm visual:test

      # Commit the pre-refreshed baseline only when the regression test
      # passed for all pages. If a non-blog page regressed, we don't want
      # to commit an updated blog baseline that might mask a real regression
      # elsewhere — investigators can see the failure with the un-committed
      # refreshed blog.png in the diffs artifact and update baselines once
      # the non-blog regression is fixed.
      - name: Commit pre-refreshed blog baseline
        if: |
          steps.scope.outputs.blog_content_changed == 'true' &&
          steps.regress.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/tests/visual-baselines/blog.png
          if git diff --cached --quiet; then
            echo "Baseline did not actually change after pre-refresh — exiting clean."
            exit 0
          fi
          # [skip ci] keeps this push from re-triggering the deploy
          # workflow and creating a publish loop.
          git commit -m "chore(docs): auto-refresh blog visual baseline after content change [skip ci]"

          # Retry with fetch+rebase: develop can move while this ~3-min job
          # is running (e.g., another PR merges right behind a blog content
          # push). Without retry, a dropped push here leaves the baseline
          # stale on develop and trips every subsequent non-blog PR until
          # someone refreshes manually.
          for attempt in 1 2 3 4 5; do
            git fetch origin develop
            if ! git rebase origin/develop; then
              # Rebase conflict is vanishingly unlikely (we only touch one PNG)
              # and would mean a parallel run also refreshed the baseline.
              # In that case our refresh is redundant — drop it.
              # `|| true` so a failed --abort (e.g., already-clean rebase state)
              # doesn't trip set -e and turn the exit-0 path into exit-1.
              git rebase --abort || true
              echo "Rebase conflict on attempt $attempt — abandoning auto-refresh (parallel refresh likely already landed)."
              exit 0
            fi
            if git push origin HEAD:develop; then
              echo "Pushed baseline refresh on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt; will fetch + rebase + retry."
            # Skip the backoff on the last iteration — no retry follows it.
            if [ "$attempt" -lt 5 ]; then
              sleep $((RANDOM % 5 + 2))
            fi
          done
          echo "Failed to push baseline refresh after 5 attempts — develop is unusually contended."
          echo "The auto-refresh will be retried on the next push that touches web/content/blog/posts/."
          exit 1

      - name: Fail job on real regression
        if: steps.regress.outcome == 'failure'
        env:
          BLOG_CONTENT_CHANGED: ${{ steps.scope.outputs.blog_content_changed }}
        run: |
          echo "Visual regression failed."
          if [ "$BLOG_CONTENT_CHANGED" = "true" ]; then
            echo "Note: the blog baseline was pre-refreshed for this run, so any"
            echo "[blog] failure here would be a mismatch separate from content drift."
            echo "Failure is most likely on another page."
          fi
          echo "Download the visual-regression-diffs artifact and update baselines as needed."
          exit 1

      - name: Upload diffs on failure
        if: steps.regress.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-diffs
          path: |
            web/tests/visual-diffs/*.png
            web/tests/visual-baselines/*.png
          if-no-files-found: ignore
          retention-days: 14

# Note: the packages-index baseline auto-refresh that fires on
# repository_dispatch: registry-updated lives in its own workflow file
# at .github/workflows/refresh-packages-baseline.yml so it doesn't
# appear as a "skipped" check on regular PRs.
