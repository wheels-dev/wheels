# Publishes a develop snapshot to wheels-dev/wheels-snapshots on every merge.
#
# Why a separate repo for snapshots? Two reasons:
#
#   1. The main repo's Releases page stays curated for GA tags only (~6-12/year)
#      so users can scan it for actual milestones. Snapshots churn at ~200-500/year,
#      which would drown the GA tags.
#
#   2. Garbage collection. We want to retain ~30 days of snapshots so users can
#      bisect regressions, but indefinitely-growing snapshot history serves nobody.
#      A separate repo lets us run cleanup workflows over there without touching
#      the main repo's release history.
#
# Why not just prerelease=true on the main repo? Same reason — GitHub's UI
# de-emphasizes pre-releases but they still appear on the page. The snapshot
# repo is invisible-by-default to anyone landing on wheels-dev/wheels.
#
# Auth: this workflow needs a personal access token (or fine-grained PAT) with
# write access to wheels-dev/wheels-snapshots. Stored as
# WHEELS_SNAPSHOTS_TOKEN in the wheels-dev/wheels repo secrets.
name: Publish Snapshot

on:
  push:
    branches: [develop]
  workflow_dispatch:  # allow manual re-runs without forcing a dummy commit

permissions:
  contents: read

env:
  WHEELS_PRERELEASE: true
  LUCLI_VERSION: "0.3.7"
  SNAPSHOT_REPO: wheels-dev/wheels-snapshots

jobs:
  publish-snapshot:
    name: Build & Publish Snapshot
    runs-on: ubuntu-latest
    env:
      # Hoist all github-context fields to job-level env so run: blocks
      # reference them via shell ${VAR}, never via ${ {github.*} }
      # interpolation. This is the canonical safe pattern from
      # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
      RUN_NUMBER: ${{ github.run_number }}
      COMMIT_SHA: ${{ github.sha }}
      WORKFLOW_RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Compute snapshot version
        run: |
          # Same shape as release.yml's develop branch: <next-target>-snapshot.<run>.
          # The <next-target> is whatever wheels.json declares — the maintainer
          # is responsible for bumping it after each GA via the auto-bump workflow.
          BASE_VERSION=$(jq -r '.version' wheels.json)
          WHEELS_VERSION="${BASE_VERSION}-snapshot.${RUN_NUMBER}"
          echo "WHEELS_VERSION=${WHEELS_VERSION}" >> $GITHUB_ENV
          echo "BRANCH=develop" >> $GITHUB_ENV
          echo "Building snapshot ${WHEELS_VERSION}"

      - name: Make build scripts executable
        run: chmod +x tools/build/scripts/*.sh

      - name: Prepare Wheels Core
        run: |
          ./tools/build/scripts/prepare-core.sh \
            "${WHEELS_VERSION}" "${BRANCH}" "${RUN_NUMBER}" "${WHEELS_PRERELEASE}"

      - name: Prepare Wheels CLI
        run: |
          ./tools/build/scripts/prepare-cli.sh \
            "${WHEELS_VERSION}" "${BRANCH}" "${RUN_NUMBER}" "${WHEELS_PRERELEASE}"

      - name: Build Wheels Core
        run: |
          ./tools/build/scripts/build-core.sh \
            "${WHEELS_VERSION}" "${BRANCH}" "${RUN_NUMBER}" "${WHEELS_PRERELEASE}"

      - name: Build Wheels CLI
        run: |
          ./tools/build/scripts/build-cli.sh \
            "${WHEELS_VERSION}" "${BRANCH}" "${RUN_NUMBER}" "${WHEELS_PRERELEASE}"

      - name: Install nfpm
        run: |
          NFPM_VERSION="2.40.0"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin nfpm
          nfpm --version

      - name: Build Linux packages (.deb / .rpm) — bleeding-edge channel
        env:
          CHANNEL: bleeding-edge
          OUT_DIR: artifacts/wheels/${{ env.WHEELS_VERSION }}
        run: bash tools/distribution-drafts/linux-packages/build-linux-packages.sh

      - name: List build artifacts
        run: |
          echo "Artifacts produced:"
          ls -la "artifacts/wheels/${WHEELS_VERSION}/" 2>/dev/null || true

      # Pinned to the same softprops version as release.yml. See the comment
      # block in release.yml around line 320 for the full rationale (v3.0.0
      # has a deterministic upload-failure on this repo's pattern).
      - name: Publish Snapshot Release
        uses: Wandalen/wretry.action@v3
        with:
          action: softprops/action-gh-release@v2.6.2
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            tag_name: v${{ env.WHEELS_VERSION }}
            name: Wheels ${{ env.WHEELS_VERSION }}
            body: |
              Automated snapshot from `wheels-dev/wheels` develop branch.

              Install:
              ```
              brew upgrade wheels-be
              ```
            draft: false
            prerelease: true
            target_commitish: ${{ env.COMMIT_SHA }}
            repository: ${{ env.SNAPSHOT_REPO }}
            token: ${{ secrets.WHEELS_SNAPSHOTS_TOKEN }}
            files: |
              artifacts/wheels/${{ env.WHEELS_VERSION }}/wheels-core-*.zip
              artifacts/wheels/${{ env.WHEELS_VERSION }}/wheels-core-*.md5
              artifacts/wheels/${{ env.WHEELS_VERSION }}/wheels-core-*.sha512
              artifacts/wheels/${{ env.WHEELS_VERSION }}/wheels-cli-*.zip
              artifacts/wheels/${{ env.WHEELS_VERSION }}/wheels-cli-*.md5
              artifacts/wheels/${{ env.WHEELS_VERSION }}/wheels-cli-*.sha512
              artifacts/wheels/${{ env.WHEELS_VERSION }}/wheels-be_*_amd64.deb
              artifacts/wheels/${{ env.WHEELS_VERSION }}/wheels-be-*.x86_64.rpm

      # After publishing, fan out to the brew tap so wheels-be.rb auto-bumps.
      # The tap own workflow (wheels-be-bump.yml) listens for this dispatch,
      # downloads the new snapshot sha256s, opens a PR with the formula update.
      - name: Notify brew tap of new snapshot
        if: success()
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "DOWNSTREAM_DISPATCH_TOKEN not configured — tap will pick this up on its daily cron instead."
            exit 0
          fi
          gh api repos/wheels-dev/homebrew-wheels/dispatches \
            -f event_type=snapshot-published \
            -f client_payload[version]="${WHEELS_VERSION}" \
            -f client_payload[sha]="${COMMIT_SHA}" \
            || echo "Dispatch failed (non-fatal)."
