# nfpm config for the bleeding-edge channel `wheels-be` package (.deb / .rpm).
#
# Mirror of nfpm-wheels.yaml with three differences:
#   - package name: wheels-be
#   - version interpolated from WHEELS_VERSION which already includes the
#     -snapshot.N suffix on develop builds
#   - conflicts with the wheels package so users can't install both
#
# Build with:
#   nfpm pkg --packager deb --target dist/wheels-be_${WHEELS_VERSION}_amd64.deb
#   nfpm pkg --packager rpm --target dist/wheels-be-${WHEELS_VERSION}.x86_64.rpm

name: wheels-be
# Architecture-independent (Java jar + CFML + shell wrapper). PKG_ARCH is set by
# build-linux-packages.sh — `all` for deb, `noarch` for rpm.
arch: ${PKG_ARCH}
platform: linux
version: ${WHEELS_VERSION}
section: devel
priority: optional
maintainer: Wheels Team <hello@wheels.dev>
description: |
  Wheels — CFML MVC framework — bleeding-edge channel.
  Same CLI as the stable `wheels` package, but tracks develop snapshots.
  Updates on every merge to wheels-dev/wheels develop branch.
vendor: Wheels
homepage: https://wheels.dev
license: Apache-2.0
contents:
  # Portable LuCLI launcher jar; the wrapper runs it via
  # `java -Dlucli.binary.name=wheels -jar` (arch-independent). See #2700.
  - src: ./build/lucli.jar
    dst: /opt/wheels/lucli.jar
    file_info:
      mode: 0644
  - src: ./build/module/
    dst: /opt/wheels/module/
    type: tree
  # Framework source — see nfpm-wheels.yaml for the full explainer of why src
  # MUST be ./build/framework/wheels/ (with trailing /wheels/), not bare
  # ./build/framework/. Short version: nfpm `type: tree` copies src contents
  # into dst, and the wheels-core-VER.zip preserves a top-level wheels/ dir,
  # so without the inner /wheels/ we get a double-nested
  # /opt/wheels/module/vendor/wheels/wheels/ that breaks runtime resolution
  # of `wheels.Injector`. See issue #2773.
  - src: ./build/framework/wheels/
    dst: /opt/wheels/module/vendor/wheels/
    type: tree
  - src: ./build/sqlite-jdbc.jar
    dst: /opt/wheels/sqlite-jdbc.jar
    file_info:
      mode: 0644
  # Version + channel stamps read by the wrapper for `wheels --version`. See #2700.
  - src: ./build/.version
    dst: /opt/wheels/.version
    file_info:
      mode: 0644
  - src: ./build/.channel
    dst: /opt/wheels/.channel
    file_info:
      mode: 0644
  - src: ./build/wrapper.sh
    dst: /usr/bin/wheels
    file_info:
      mode: 0755
overrides:
  deb:
    depends:
      - openjdk-21-jre-headless | openjdk-21-jre
      - tar
    conflicts:
      - wheels
    replaces:
      - wheels
  rpm:
    depends:
      - java-21-openjdk-headless
      # Rocky Linux 10 minimal cloud images do not ship tar. See #2700.
      - tar
    conflicts:
      - wheels
deb:
  fields:
    Bugs: https://github.com/wheels-dev/wheels/issues
rpm:
  group: Development/Tools
  signature:
    key_file: ${NFPM_RPM_SIGN_KEY:-}
